services:
  - type: web
    name: ai-insights-api
    runtime: node
    buildCommand: |
      pnpm install
      pnpm build
    startCommand: node --max-old-space-size=300 dist/app.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
    healthCheckPath: /health
    autoDeploy: true
