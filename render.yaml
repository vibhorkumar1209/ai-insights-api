services:
  - type: web
    name: ai-insights-api
    env: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: node --max-old-space-size=300 dist/app.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PARALLEL_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
